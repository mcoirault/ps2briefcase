name: Release

on:
  push:
    branches: [ "test-workflow" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{matrix.os.name}}
    strategy:
      matrix:
        os:
          - name: ubuntu
            version: ubuntu-latest
            executable: ps2briefcase
            renamed-executable: ps2briefcase
          - name: macos
            version: macos-latest
            executable: ps2briefcase
            renamed-executable: ps2briefcase-macos
          - name: windows
            version: windows-latest
            executable: ps2briefcase.exe
            renamed-executable: ps2briefcase.exe
    runs-on: ${{matrix.os.version}}
    
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose --release
      - name: Run tests
        run: cargo test --verbose
      - name: Rename binary
        run: mv ${{matrix.os.executable}} ${{matrix.os.renamed-executable}}
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ps2briefcase-${{matrix.os.name}}
          path: target/release/${{matrix.os.renamed-executable}}
          if-no-files-found: error
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/release/${{matrix.os.renamed-executable}}
          tag: ${{ github.ref }}
          overwrite: true
          draft: true