name: Release

on:
  push:
    branches: [ "test-workflow" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{matrix.os.name}}
    strategy:
      matrix:
        os:
          - name: ubuntu
            version: ubuntu-latest
            executable: ps2briefcase-ubuntu
          - name: macos
            version: macos-latest
            executable: ps2briefcase-macos
          - name: windows
            version: windows-latest
            executable: ps2briefcase.exe
    runs-on: ${{matrix.os.version}}
    
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose --release
      - name: Run tests
        run: cargo test --verbose
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ps2briefcase-${{matrix.os.name}}
          path: target/release/${{matrix.os.executable}}
  release:
    name: Release
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: ncipollo/release-action@v1
        with:
          artifacts: target/release/*
          artifactErrorsFailBuild: true
          body: 'this is a draft release'
          draft: true
          tag: test